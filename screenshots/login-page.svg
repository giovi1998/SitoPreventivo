<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F6F8FC"/>
  
  <!-- Login card -->
  <rect x="250" y="100" width="300" height="400" rx="20" fill="#ffffff" stroke="#c8d0df" stroke-width="2"/>
  
  <!-- User icon -->
  <circle cx="400" cy="160" r="32" fill="rgba(11, 87, 208, 0.1)"/>
  <circle cx="400" cy="150" r="12" fill="#0B57D0"/>
  <path d="M388 170 Q400 180 412 170" stroke="#0B57D0" stroke-width="2" fill="none"/>
  
  <!-- Title -->
  <text x="400" y="210" font-family="sans-serif" font-weight="900" font-size="20" fill="#07111f" text-anchor="middle">Accesso</text>
  <text x="400" y="230" font-family="sans-serif" font-size="12" fill="#647086" text-anchor="middle">Accedi al tuo account PrecisionQuote</text>
  
  <!-- Email field -->
  <text x="270" y="270" font-family="sans-serif" font-weight="900" font-size="10" fill="#647086">EMAIL</text>
  <rect x="270" y="280" width="260" height="40" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="290" y="305" font-family="sans-serif" font-size="12" fill="#647086">La tua email</text>
  
  <!-- Password field -->
  <text x="270" y="340" font-family="sans-serif" font-weight="900" font-size="10" fill="#647086">PASSWORD</text>
  <rect x="270" y="350" width="260" height="40" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="290" y="375" font-family="sans-serif" font-size="12" fill="#647086">La tua password</text>
  
  <!-- Login button -->
  <rect x="270" y="410" width="260" height="45" rx="12" fill="#0B57D0"/>
  <text x="400" y="437" font-family="sans-serif" font-weight="850" font-size="14" fill="#ffffff" text-anchor="middle">Accedi</text>
  
  <!-- Back link -->
  <text x="400" y="480" font-family="sans-serif" font-size="12" fill="#647086" text-anchor="middle">← Torna alla home</text>
  
  <!-- Footer -->
  <text x="400" y="560" font-family="sans-serif" font-size="10" fill="#647086" text-anchor="middle">PrecisionQuote © 2026 - Login page screenshot</text>
</svg>