<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F6F8FC"/>
  
  <!-- 404 icon -->
  <circle cx="400" cy="180" r="60" fill="rgba(11, 87, 208, 0.1)"/>
  <text x="400" y="185" font-family="sans-serif" font-weight="950" font-size="24" fill="#0B57D0" text-anchor="middle">!</text>
  
  <!-- 404 text -->
  <text x="400" y="280" font-family="sans-serif" font-weight="950" font-size="72" fill="#07111f" text-anchor="middle">404</text>
  
  <!-- Title -->
  <text x="400" y="320" font-family="sans-serif" font-weight="800" font-size="24" fill="#07111f" text-anchor="middle">Pagina non trovata</text>
  
  <!-- Description -->
  <text x="400" y="350" font-family="sans-serif" font-size="16" fill="#647086" text-anchor="middle">La pagina che stai cercando non esiste o è stata spostata.</text>
  
  <!-- Back button -->
  <rect x="350" y="380" width="100" height="45" rx="12" fill="#0B57D0"/>
  <text x="400" y="407" font-family="sans-serif" font-weight="850" font-size="14" fill="#ffffff" text-anchor="middle">Torna alla home</text>
  
  <!-- Contact info -->
  <rect x="300" y="440" width="200" height="50" rx="12" fill="rgba(255,255,255,0.8)" stroke="#c8d0df" stroke-width="1"/>
  <text x="400" y="465" font-family="sans-serif" font-size="12" fill="#647086" text-anchor="middle">Se pensi sia un errore, contatta</text>
  <text x="400" y="480" font-family="sans-serif" font-weight="600" font-size="12" fill="#07111f" text-anchor="middle">Giovanni Cidu</text>
  
  <!-- Footer -->
  <text x="400" y="560" font-family="sans-serif" font-size="10" fill="#647086" text-anchor="middle">PrecisionQuote © 2026 - 404 page screenshot</text>
</svg>