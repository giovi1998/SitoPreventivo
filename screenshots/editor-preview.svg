  <rect x="360" y="320" width="380" height="220" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="380" y="350" font-family="sans-serif" font-weight="800" font-size="14" fill="#0B57D0">Anteprima documento</text>
  <text x="380" y="370" font-family="sans-serif" font-size="11" fill="#647086">Preview live del preventivo</text>
  
