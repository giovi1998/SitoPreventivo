<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F6F8FC"/>
  <rect x="20" y="20" width="760" height="560" rx="20" fill="#ffffff" stroke="#c8d0df" stroke-width="2"/>
  
  <!-- Sidebar -->
