  <text x="90" y="65" font-family="sans-serif" font-weight="800" font-size="14" fill="#082033">PrecisionQuote</text>
  <text x="90" y="80" font-family="sans-serif" font-size="10" fill="#647086">Preventivi custom</text>
  
  <!-- Navigation buttons -->
