  <rect x="40" y="175" width="240" height="45" rx="12" fill="rgba(255,255,255,0.14)"/>
  <text x="60" y="203" font-family="sans-serif" font-weight="850" font-size="14" fill="#cfe0f2">Collection</text>
  
  <rect x="40" y="230" width="240" height="45" rx="12" fill="rgba(255,255,255,0.14)"/>
  <text x="60" y="258" font-family="sans-serif" font-weight="850" font-size="14" fill="#cfe0f2">Login</text>
  
  <!-- Main content area -->
  <rect x="320" y="20" width="460" height="560" rx="0" fill="#ffffff"/>
  
  <!-- Top bar -->
  <rect x="320" y="20" width="460" height="72" fill="#ffffff"/>
  <text x="340" y="50" font-family="sans-serif" font-size="12" fill="#647086">Editor operativo</text>
  <text x="340" y="70" font-family="sans-serif" font-weight="800" font-size="20" fill="#07111f">Editor preventivo</text>
  <rect x="680" y="45" width="80" height="35" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="695" y="67" font-family="sans-serif" font-weight="850" font-size="12" fill="#07111f">Salva</text>
  <rect x="770" y="45" width="80" height="35" rx="12" fill="#0B57D0"/>
  <text x="785" y="67" font-family="sans-serif" font-weight="850" font-size="12" fill="#ffffff">Esporta PDF</text>
  
  <!-- Editor grid -->
  <rect x="340" y="110" width="420" height="450" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="140" font-family="sans-serif" font-weight="800" font-size="16" fill="#07111f">AI Assistant</text>
  <text x="360" y="160" font-family="sans-serif" font-size="12" fill="#647086">Modifica il preventivo con prompt AI</text>
  
  <!-- AI textarea -->
  <rect x="360" y="180" width="380" height="80" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="380" y="210" font-family="sans-serif" font-size="11" fill="#647086">Prepara un preventivo per il sito web...</text>
  
  <!-- AI buttons -->
  <rect x="360" y="270" width="120" height="35" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="375" y="292" font-family="sans-serif" font-weight="850" font-size="11" fill="#07111f">Rendi premium</text>
  
  <rect x="490" y="270" width="120" height="35" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="505" y="292" font-family="sans-serif" font-weight="850" font-size="11" fill="#07111f">Template sito</text>
  
  <rect x="620" y="270" width="120" height="35" rx="12" fill="#ffffff" stroke="#c8d0df" stroke-width="1"/>
  <text x="635" y="292" font-family="sans-serif" font-weight="850" font-size="11" fill="#07111f">Aggiungi timeline</text>
  
